<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Люстра AR</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; color:#fff; font-family:sans-serif; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #info { text-align:center; padding:24px; max-width:360px; }
    h1 { font-size:1.5em; margin-bottom:10px; }
    p { font-size:0.9em; color:#aaa; margin-bottom:24px; line-height:1.6; }
    #start-btn { background:#fff; color:#111; border:none; padding:14px 36px; font-size:1.1em; border-radius:30px; cursor:pointer; font-weight:bold; }
    #start-btn:disabled { background:#444; color:#888; cursor:not-allowed; }
    #status { margin-top:14px; font-size:0.85em; color:#f0c040; min-height:22px; }
    canvas { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
    #overlay {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:10;
      flex-direction:column; justify-content:space-between; align-items:center;
      padding:24px 16px;
    }
    #hint {
      background:rgba(0,0,0,0.6); color:#fff; padding:10px 20px;
      border-radius:20px; font-size:0.88em; text-align:center;
      backdrop-filter:blur(6px);
    }
    #controls { display:flex; flex-direction:column; align-items:center; gap:10px; pointer-events:all; width:100%; }
    .btn-row { display:flex; gap:10px; justify-content:center; }
    .ctrl-btn {
      background:rgba(255,255,255,0.15); color:#fff;
      border:1.5px solid rgba(255,255,255,0.4);
      padding:12px 18px; border-radius:24px; font-size:0.9em;
      cursor:pointer; backdrop-filter:blur(6px); min-width:90px; text-align:center;
    }
    .label { font-size:0.75em; color:rgba(255,255,255,0.6); text-align:center; }
    #exit-btn { background:rgba(255,0,0,0.3); border-color:rgba(255,100,100,0.5); }
  </style>
</head>
<body>

<div id="info">
  <h1>🔦 Люстра AR</h1>
  <p>Направте телефон вперед.<br/>Люстра з'явиться автоматично.<br/>Регулюйте висоту і розмір кнопками.</p>
  <button id="start-btn" disabled>Запустити AR</button>
  <div id="status">Перевірка підтримки...</div>
</div>

<canvas id="canvas"></canvas>

<div id="overlay">
  <div id="hint">Завантаження моделі...</div>
  <div id="controls">
    <div class="label">Висота</div>
    <div class="btn-row">
      <button class="ctrl-btn" id="up-btn">⬆️ Вище</button>
      <button class="ctrl-btn" id="down-btn">⬇️ Нижче</button>
    </div>
    <div class="label" style="margin-top:4px">Розмір</div>
    <div class="btn-row">
      <button class="ctrl-btn" id="smaller-btn">➖ Менше</button>
      <button class="ctrl-btn" id="bigger-btn">➕ Більше</button>
    </div>
    <div class="btn-row" style="margin-top:6px">
      <button class="ctrl-btn" id="reset-btn">🔄 Скинути</button>
      <button class="ctrl-btn" id="exit-btn">✕ Вийти</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
  const MODEL_URL = './2000174CL-06G_7.glb';

  const statusEl = document.getElementById('status');
  const startBtn = document.getElementById('start-btn');
  const overlay  = document.getElementById('overlay');
  const hintEl   = document.getElementById('hint');
  const infoEl   = document.getElementById('info');
  const canvas   = document.getElementById('canvas');

  let renderer, scene, camera, model;
  let xrSession = null;
  let modelBaseScale = 1.0;
  let currentScale = 1.0;
  let heightOffset = 0;
  let modelPlaced = false;

  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then(ok => {
      if (ok) { statusEl.textContent = '✅ AR підтримується'; startBtn.disabled = false; }
      else statusEl.textContent = '❌ AR не підтримується. Потрібен Chrome на Android.';
    });
  } else {
    statusEl.textContent = '❌ Потрібен Chrome на Android';
  }

  startBtn.addEventListener('click', startAR);
  document.getElementById('exit-btn').addEventListener('click', stopAR);
  document.getElementById('bigger-btn').addEventListener('click',  () => changeScale(1.15));
  document.getElementById('smaller-btn').addEventListener('click', () => changeScale(0.87));
  document.getElementById('up-btn').addEventListener('click',   () => changeHeight(+0.15));
  document.getElementById('down-btn').addEventListener('click', () => changeHeight(-0.15));
  document.getElementById('reset-btn').addEventListener('click', () => {
    currentScale = 1.0; heightOffset = 0;
    if (model) { model.scale.setScalar(modelBaseScale); placeModel(); }
  });

  function changeScale(f) {
    currentScale = Math.max(0.1, Math.min(6, currentScale * f));
    if (model) model.scale.setScalar(modelBaseScale * currentScale);
  }

  function changeHeight(d) {
    heightOffset += d;
    if (model) model.position.y += d;
  }

  function placeModel() {
    if (!model || !camera) return;
    // Розміщуємо люстру вище камери — як на стелі
    model.position.set(
      camera.position.x,
      camera.position.y + 1.0 + heightOffset,
      camera.position.z - 1.2
    );
  }

  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 30);

    scene.add(new THREE.AmbientLight(0xffffff, 1.8));
    const d1 = new THREE.DirectionalLight(0xffffff, 1.0);
    d1.position.set(2, 4, 2); scene.add(d1);
    const d2 = new THREE.DirectionalLight(0xffffff, 0.4);
    d2.position.set(-2, -1, -2); scene.add(d2);

    const loader = new THREE.GLTFLoader();
    loader.load(MODEL_URL, gltf => {
      model = gltf.scene;

      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      modelBaseScale = 0.7 / maxDim;
      model.scale.setScalar(modelBaseScale);

      // Pivot зверху
      box.setFromObject(model);
      model.position.y -= box.max.y;

      model.visible = false;
      scene.add(model);
      hintEl.textContent = '✅ Готово! Направте камеру вперед';
    }, xhr => {
      if (xhr.total) hintEl.textContent = `Завантаження: ${Math.round(xhr.loaded/xhr.total*100)}%`;
    }, err => {
      hintEl.textContent = '❌ Помилка завантаження моделі';
      console.error(err);
    });
  }

  async function startAR() {
    initThree();
    try {
      xrSession = await navigator.xr.requestSession('immersive-ar', {
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
      });
    } catch(e) {
      statusEl.textContent = '❌ ' + e.message;
      return;
    }

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(xrSession);

    infoEl.style.display = 'none';
    canvas.style.display = 'block';
    overlay.style.display = 'flex';
    modelPlaced = false;

    xrSession.addEventListener('end', onSessionEnd);

    // Pinch to scale
    let lastDist = null;
    const getDist = t => {
      const dx = t[0].clientX-t[1].clientX, dy = t[0].clientY-t[1].clientY;
      return Math.sqrt(dx*dx+dy*dy);
    };
    canvas.addEventListener('touchstart', e => { if(e.touches.length===2) lastDist=getDist(e.touches); }, {passive:true});
    canvas.addEventListener('touchmove',  e => { if(e.touches.length===2&&lastDist){ const d=getDist(e.touches); changeScale(d/lastDist); lastDist=d; } }, {passive:true});
    canvas.addEventListener('touchend',   e => { if(e.touches.length<2) lastDist=null; }, {passive:true});

    renderer.setAnimationLoop(render);
  }

  function render(timestamp, frame) {
    if (!frame) return;

    if (model && !modelPlaced && camera.position.length() > 0) {
      placeModel();
      model.visible = true;
      modelPlaced = true;
      hintEl.textContent = '⬆️⬇️ Регулюйте висоту і розмір';
    }

    renderer.render(scene, camera);
  }

  function stopAR() { if (xrSession) xrSession.end(); }

  function onSessionEnd() {
    xrSession = null;
    canvas.style.display = 'none';
    overlay.style.display = 'none';
    infoEl.style.display = 'flex';
    modelPlaced = false;
  }
</script>
</body>
</html>
