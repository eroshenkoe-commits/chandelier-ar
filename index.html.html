<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Люстра AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #info { text-align: center; padding: 20px; }
    h1 { font-size: 1.4em; margin-bottom: 10px; }
    p { font-size: 0.9em; color: #aaa; margin-bottom: 20px; }
    #start-btn {
      background: #fff;
      color: #111;
      border: none;
      padding: 14px 32px;
      font-size: 1.1em;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }
    #start-btn:disabled { background: #555; color: #999; cursor: not-allowed; }
    #status { margin-top: 16px; font-size: 0.85em; color: #f0c040; min-height: 24px; text-align: center; }
    canvas { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    #exit-btn {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 2px solid #fff;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 1em;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(6px);
    }
    #hint {
      display: none;
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9em;
      text-align: center;
      z-index: 100;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="info">
  <h1>🔦 Люстра в AR</h1>
  <p>Наведіть камеру на стелю.<br/>Коли з'явиться маркер — натисніть щоб розмістити люстру.</p>
  <button id="start-btn">Запустити AR</button>
  <div id="status">Перевірка підтримки WebXR...</div>
</div>

<canvas id="canvas"></canvas>
<div id="hint">📱 Направте камеру на стелю</div>
<button id="exit-btn">✕ Вийти з AR</button>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- GLTFLoader -->
<script>
// Inline GLTFLoader (r128 compatible)
</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
  // ============================================================
  // 👇 ВСТАВТЕ СВОЄ ПОСИЛАННЯ НА .glb ФАЙЛ ТУТ:
  const MODEL_URL = 'https://YOUR_HOSTING/your-chandelier.glb';
  // ============================================================

  const statusEl = document.getElementById('status');
  const startBtn = document.getElementById('start-btn');
  const exitBtn = document.getElementById('exit-btn');
  const hintEl = document.getElementById('hint');
  const infoEl = document.getElementById('info');
  const canvas = document.getElementById('canvas');

  let renderer, scene, camera, model;
  let xrSession = null;
  let hitTestSource = null;
  let hitTestSourceRequested = false;
  let reticle; // маркер на стелі
  let placed = false;

  // Перевірка WebXR
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then(supported => {
      if (supported) {
        statusEl.textContent = '✅ AR підтримується';
        startBtn.disabled = false;
      } else {
        statusEl.textContent = '❌ AR не підтримується на цьому пристрої';
        startBtn.disabled = true;
      }
    });
  } else {
    statusEl.textContent = '❌ WebXR не підтримується. Потрібен Chrome на Android.';
    startBtn.disabled = true;
  }

  startBtn.addEventListener('click', startAR);
  exitBtn.addEventListener('click', stopAR);

  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    // Освітлення
    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);

    // Маркер (reticle) — кружок що показує де стеля
    const ringGeo = new THREE.RingGeometry(0.05, 0.08, 32);
    ringGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
    reticle = new THREE.Mesh(ringGeo, ringMat);
    reticle.visible = false;
    scene.add(reticle);

    // Завантажити модель
    const loader = new THREE.GLTFLoader();
    loader.load(
      MODEL_URL,
      (gltf) => {
        model = gltf.scene;

        // Нормалізація розміру
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 0.8 / maxDim;
        model.scale.setScalar(scale);

        // Pivot зверху: зміщуємо модель так щоб верхня точка = (0,0,0)
        const center = box.getCenter(new THREE.Vector3());
        model.position.set(
          -center.x * scale,
          (-box.min.y) * scale, // верхня точка на Y=0, модель висить вниз
          -center.z * scale
        );

        model.visible = false;
        scene.add(model);
        statusEl.textContent = '✅ Модель завантажена';
      },
      (xhr) => {
        statusEl.textContent = `Завантаження: ${Math.round(xhr.loaded / xhr.total * 100)}%`;
      },
      (err) => {
        statusEl.textContent = '❌ Помилка завантаження моделі';
        console.error(err);
      }
    );
  }

  async function startAR() {
    initThree();

    try {
      xrSession = await navigator.xr.requestSession('immersive-ar', {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
      });
    } catch(e) {
      statusEl.textContent = '❌ Не вдалось запустити AR: ' + e.message;
      return;
    }

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(xrSession);

    infoEl.style.display = 'none';
    canvas.style.display = 'block';
    exitBtn.style.display = 'block';
    hintEl.style.display = 'block';
    placed = false;

    xrSession.addEventListener('end', onSessionEnd);

    // Tap для розміщення
    xrSession.addEventListener('select', onSelect);

    renderer.setAnimationLoop(render);
  }

  function onSelect() {
    if (reticle.visible && model && !placed) {
      // Розміщуємо модель там де reticle (на стелі)
      model.position.setFromMatrixPosition(reticle.matrix);
      // Люстра висить ВНИЗ від точки стелі
      model.visible = true;
      placed = true;
      hintEl.textContent = '✅ Люстра розміщена! Походіть навколо.';
      setTimeout(() => { hintEl.style.display = 'none'; }, 3000);
    } else if (placed) {
      // Повторний тап — перемістити
      if (reticle.visible) {
        model.position.setFromMatrixPosition(reticle.matrix);
      }
    }
  }

  function render(timestamp, frame) {
    if (!frame) return;

    const referenceSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();

    // Hit test source — шукаємо горизонтальні поверхні (в т.ч. стелю)
    if (!hitTestSourceRequested) {
      session.requestReferenceSpace('viewer').then(viewerSpace => {
        session.requestHitTestSource({ space: viewerSpace }).then(source => {
          hitTestSource = source;
        });
      });
      hitTestSourceRequested = true;
    }

    if (hitTestSource) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);

      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);

        if (pose) {
          const pos = pose.transform.position;
          const camPose = frame.getViewerPose(referenceSpace);

          if (camPose) {
            const camY = camPose.transform.position.y;
            // Показуємо reticle тільки якщо поверхня ВИЩЕ камери (стеля)
            if (pos.y > camY + 0.3) {
              reticle.visible = true;
              reticle.matrix.fromArray(pose.transform.matrix);
              if (!placed) hintEl.textContent = '👆 Натисніть щоб розмістити люстру';
            } else {
              if (!placed) {
                reticle.visible = false;
                hintEl.textContent = '📱 Направте камеру на стелю';
              }
            }
          }
        }
      } else {
        if (!placed) reticle.visible = false;
      }
    }

    renderer.render(scene, camera);
  }

  function stopAR() {
    if (xrSession) xrSession.end();
  }

  function onSessionEnd() {
    xrSession = null;
    hitTestSource = null;
    hitTestSourceRequested = false;
    canvas.style.display = 'none';
    exitBtn.style.display = 'none';
    hintEl.style.display = 'none';
    infoEl.style.display = 'flex';
    statusEl.textContent = 'AR завершено. Можна запустити знову.';
    placed = false;
  }
</script>
</body>
</html>
